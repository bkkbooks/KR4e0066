body:
  text: 自怡集明劉璉撰瑞粟歌并序臣聞洪濛判而三才之道立聖人出而天地之功成此古今不易之理也欽惟皇上奮興農畝君臨天下由武功而致文治自有載籍以來不能多見也至於躬覽庶務纎微必求其要領教誨臣下必本乎道德仁義雖勞弗倦是以皇天上帝欣得聖人克受明命以昭宣其德每于政事得失之際必顯示其情而告誡焉去年秋九月星象示異皇上惕若恐懼乾乾靡寧日新厥德以格天心故兩浙雖被水潦而其民不敢為奸京師土木並興而衆庶樂趨其事海內清寧雨暘時若和氣凝結育為嘉祥乃洪武十年七月有瑞粟生圜丘署近臣拔取以進一莖兩穗者十有餘本一穗兩岐者數本臣謹按緯書曰王者德浹于地則嘉禾生又曰璇星得則嘉禾液兹非皇上敬天之至上帝降鑒之隆人事理而天道應之驗歟臣璉目覩盛事喜不能已謹獻歌一首以寓螻蟻之忱云歌曰秋氣佳節兮萬寶告成和風揚颷兮甘雨夜零風不鳴條兮雨不破塊皇天降福兮嘉祥以生維兹粟之茂實兮秀彼圓丘異穎同莖兮瓊麩翠英被沆瀣之華滋兮承日月之光精猗豐年之兆兮此其有徵昭聖皇之神德兮溥恩澤于遐荒握乾符而馭坤靈兮統百職之明良聖子神孫兮聿遵厥緒於千萬年兮福夀無疆松竹友人辭并序松竹友人者括蒼任惟信氏所以自號也夫友所以輔仁資其嵗寒不渝可以振貪懦之風者舍是奚取焉然不于人而于物遺世之情深哉且天之生材必不徒已以惟信之抱負晦其迹而彰其德又豈能終隱者耶因為之辭以遺之其辭曰維山有松兮維隰有竹樛枝櫹槮兮密葉如沃遁世遺榮兮情深行獨求長友兮爰得貞卜松有苓兮竹有實招鳴鳳兮又已疾投瓊芳兮缺清泠聊逍遙兮永終日觀飛瀑兮㵼雲玩林臯兮夕曛山可廬兮秫可酒吁其去此兮伊誰與羣雨瑟瑟兮風蕭蕭猿鶴逝兮空林幽懷質抱材兮將須世用猗若人兮胡寧久留秋日辭秋暑退兮涼風生日皓皓兮雲冥冥去鄉離家兮逺徂征鬱結紆軫兮難為情登髙四望兮渺茫茫天低埀兮湖水明蒲栁衰兮蕭瑟芰荷雕兮凄涼思丘壠兮天一涯中心悲兮莫我知莎雞啼兮夜蟬語星河粲兮螢火飛援雅琴兮不成音拊余玦兮當此時徙倚倣徨兮夜未央奮飛不能兮道路長想故山兮粳稻熟栗開苞兮桂飄香白雲英英兮在山岡德容孔昭兮懷哉勿忘望後舟望後舟望不見兮生離憂滄江濶兮路遐永木葉脫兮知嵗秋慨幽懷兮莫共寫歎芳華兮不我留卾君骨朽越歌杳何人鼓栧乘中流望後舟望不見兮心悠悠秋日旅懷七首金風正秋令開此肅殺原凝霜結嚴威草木同摧殘芳華日雕落光潤歸本根豈不懷慘凄中有生意存收藏理應爾貞脆焉足論曠哉白雲谷松風聽夜猿其二園菊冒秋色湛露滋幽香採掇盈懷袖餌服心清涼所思久暌違欲寄阻河梁芳英豈不美人意豈不良坐恐光景暮於邑隨飛霜其三草枯邊塞寒賔鴻逺于飛鴻鳴在中野風霜爍毛衣客子别故君飄搖天之涯覩此增感愴況乃秋風時耕鑿本吾心良農恆苦飢諒無摩天羽雲路非所宜鵬鷃各有志豈為小大移山林仰暘景棲息唯一枝其四秋風生白虹秋聲入髙樹離離星漢明杳杳孤鳥度夜坐不覺久逍遙散余步鬢毛動凄風羅裳怯零露寒隂日已侵芳嵗聿云暮眷言思我鄉誰與將尺素其五繁林著秋霜萬樹張錦纈斜暘照郊坰霞光粲凝結雖非三春暉明媚亦可悅薄暮涼風吹落葉飛不歇寂寞為誰容寒鴉噪明月其六夜靜天一色江水疑不流素月懸青冥翠色生髙秋駕言理舟楫足以散我憂虛明映空碧如在天上遊西溟忽震蕩寒風颭颼飀清暉蔽層隂恍惚不可求唯聽城頭角咿嗚在髙樓其七止水能燭物不流豈澄清行役雖云勞要識靜者情大道順自然奈何苦營營倐忽竅混沌淪敗由聰明支離頤隱臍乃能全其形長歌歸去來息心守吾庭種豆結屋南山隈愛此園田幽豈不念朝市居閒得優游春耕既舉趾夏苗已盈疇農人復何營藝菽在髙丘膏沐仰時雨地氣生芒勾芟夷去異種旦旦躬追搜藩籬曠且完插棘羅戈矛佇看芽茁長密葉蓊雲稠勞生愧明時暇逸敢自休夙昔思嘉言人與天地侔隨力任造化叨養固有由甘澤天所降物産地所羞克勤匪伊始何以望有秋胡為厭卑近髙逺肆厥謀瘠人以自肥反貽天地憂嘐嘐竟何補適足罹愆尤書此遺同志聊似擊壤謳遣興五首緑鳬水中遊白鶴雲間飛霄漢有修程烏能顧卑微浩蕩展羽翰崑丘以為期鵰鶚趨下風罻羅絶張施倐忽萬里餘摧頺不知歸空林有故巢繁霜日霏霏孤雌哺黃口啁哳將疇依豈如戲蘋荇雙棲在漣漪其二豆實生喬松成長亦匪易枝饒風颷摧葉飽霜露悴賴此剛徑姿挺立世所異壯哉十抱圍根据依厚地秀色凌烟霞清隂却炎熾鳥雀有宿棲螻蛄亦䝉芘奈何處其下戕賊隨已意直幹為㩻傾能不為身纍其三山中有一鬼跳蹺唯短足薜蘿充衣裳橡栗代饘粥巖崖結重隂暘光不能燭春花晝掩靄澗水秋濆薄矧兹入林墟慕此雞與鶩嘯梁兒童驚發藏婦嫗哭上天赫有威民怒曷可拗胡不安厥愛藏形以自玉其四希仙屏紛雜遺榮處幽閒靈元固重扃鼎爐合神丹灝露以為漿青松以為餐道積時亦久丰姿變蒼顔元功一朝成飄然出塵寰螭龍將軺車鸞鶴承佩環傲睨天霞表望望不可攀仙山有真樂何用思人間其五食肉有不甘茹荼乃如薺駟馬懷隱憂韋布顔無泚寸丹既融通萬理諒昭洗衰榮各有定何必勞爾爾挑燈讀我書文字浩無涘白首窮一經得祿未足喜捨已以從人園廬任荆杞憂思不能眠嘆息增徙倚送章藴德指揮還平陽衛微雨潤蒸溽薰風變寒颸客從逺方來慰我久别離髙談竟終夕感舊心傷悲别來渝四載世事紛若糜公私兩轇輵足疲目就眵相思不可見寤寐增嘆咨憶昔出海門萬艘總雄師平陽古堯都下車撫惸嫠堅城屹如山謀謨出幽思吾州舊部曲字養恩如兒此行復千里后㑹知何期長川去悠悠白日正南馳驪駒已載歌别意方凄其恨無羽翼翔中心誰當知英賢志功業名與竹帛埀勗哉樹竒勳古昔猶今時深情浩難既聊寄征行詩舟中即事天風吹白雲日落山更碧理棹泛清流濯纓俯幽石悠悠潛淵魚矯矯冲霄翮物性各有安人生嘆為客錢唐别友人辭家適京國泛舟浙江湄吳山一何髙湖水清漣漪浮雲從南來感我懷鄉思于時春向深草木好容姿幽禽樹間鳴間關雜兜離臨岐别良友中心能不悲悽惻未忍分慷慨終當辭君家住金華我居栝蒼埀同舟展良晤浩瀚陳歌詩人生無定踪㑹合誠稀竒君慕渥窪馬騰達康與逵我羡青田鶴山林自棲遲操尚雖不同意氣深相知所貴德業隆守道識盈虧相期各勉力勿為俗子嗤秋霽積雨霽郊甸涼風來早秋蒲栁變冶色寒螿生暮愁明河凝素光青山淡如浮游目睇行雲感此身世憂故鄉不可見悵望心悠悠馮公嶺雞鳴出北郭戒徒飭裝仗早發神頗疲亭午心始暢行行陟危巔路出林木上兹嶺號馮公何年得名狀想當開鑿初斯人通塞障根從西北來氣是東南壯萬里生長風煙雲中浩蕩登髙望我鄉心情增愴悵役役征途間默默幾得喪何當息塵鞅終年遂疏放春日道中雨收春日融衆草豐且碧和風拂輕衣飛花撲行客晴空搖翠烟莽蒼見山色青年豈長駐感念思夙昔隘頭山杖策躋絶壁徒步穿逺林木葉泫清露曉氣光沈沈白雲擁澗谷浩若滄溟深數峯出青翠秀色倩人心間關林中鳥和音奏鳴琴芬菲道傍花芳香襲幽襟適意豈不樂但恐嵗月侵越此即他鄉矯首空長吟過湖樂站晨䇿登逺林初日雲外赤川明寒波生野曠嵐霧白傾耳聆哀猿捫蘿隨鳥跡昔年花栁場今作荒草陌泠泠松上露冉冉如淚滴緑隂亭詩送人之臨江府尹分韻得朱字虞廷奏湘絃皇風被寰區萬物遂長養人情亦怡愈嘉樹藹新緑修篁時雨餘秀色明軒窗清隂散琴書臨江繁劇地郡治崇華居煌煌京府丞出佩太守符宣恩自畿甸皂蓋雙輪朱盤根表利器長材應時須民俗既云清丈教行將敷自公日多暇鳥雀鳴階除旋歸儀廟堂令器登璠璵嘉名繼前烈以貽來者模發清江暮過樟樹鎮曉發清江汭遙觀閣皂山山際半積雪宿雲散輕風晴旭露初晰霏霏林烟蒼炯炯疏星沒春陽亦昭曠江水亦澄徹嵗序自推遷悵焉感時節即事多所懷豈伊念離别引領望帝京丹心漫飛越次新淦栁條日以青雪消春水暖遡流何儃佪又見白日晚山光與水色取適興不淺開户靣大江憑軒見孤巘雲端野燒明天際歸舟逺憂來覺時遙歡去知星短安行復飽食使我顔色靦進德思乾乾匪躬懷蹇蹇持此慰吾心庶以善自勉泊廬陵彤霞炫餘暉日落川上明漾舟循水岸凝矚瞰連城樓閣相映帶雉堞互回縈春樹鬱蒼蒼色與暮雲平陟徑坐孤驛華燭熒如星端居有餘閒庭館凄以清稍喜人語靜又聞翔雁鳴依依越鄉感戚戚懷祿情覽詩不成章欲語誰與聆入萬安崇山抱回溪川路漸窈深竹樹緣髙阜洞壑隱層林近眺發新興逺望暢幽心東風若有情雲日乍晴隂出潛有游鱗遷喬多好音芳春若堪折請折丘中琴晚眺西山山色十二時江流數千里亭亭青芙蓉搖艷映江水落日片帆飛遙見白雲起逸駕邈難攀汀洲老芳芷自君之出矣八首自君之出矣金爐烟不裊思君如露桃紅淚墮春曉其二自君之出矣歡娛共誰伍思君如梅子青青含酸苦其三自君之出矣空䦨愁獨守思君如池荷見蓮不見藕其四自君之出矣中心劇含梗思君如纎絺蕭索不禁冷其五自君之出矣昧壁蟲自語思君如羇烏夜夜啼達曙其六自君之出矣蟬鬢枯可燎思君如流螢持明徒自照其七自君之出矣瑶瑟塵滿柱思君如回風旋轉無定處其八自君之出矣芳香銷玉體思君如河氷堅凝直到底題雲林圖贈伯琛我家昔住蒼山巔竹樹杳藹當庭軒有山竟日情不厭時與白雲相往還邇來别家又三載引領長望心悁悁豫章曹君江海客濟時久習軒岐術深情迥若彭蠡寬逸氣逺與匡廬適偶然贈此雲林幽黛色烟光逺相逼採芝却憶商山翁種杏自喜多隂功良醫良相各有志豈與流俗論卑隆伊余蹇拙無所似好古每欲尋髙踪山中黃精倘或煮幅巾裋褐期相從春江行分韻得春字濃濃楊栁含嬌春落花細逐錦色鱗蘆芽出水碧玉短沙嘴激浪跳珠勻髙檣大舸江之濱花驄驕嘶踏翠茵何人解歌滄浪曲願將此水霑纓塵將曉東方未明星粲粲霜華蔽野銀色爛篙工敲火起行舟驚雁相呼入雲漢岸回水碧知去程荒郊似有晨雞鳴曈曈旭日應可覩寒威不用來相仍烈風寒風烈烈西北起峭帆徑入長河水浪濤喧擊勢排空雷音殷轔恆在耳青天倐忽日西入氷懸岸石頭􅋾􅋾泊舟沽酒澆愁腸仰面看雲空佇立遣悶三首天光沈隂嵗將暮客子驅車逐歸路塞鴻呌入吳江雲野鳥對立枯桑樹茫茫四顧少行人括蒼之山渺何處愁心如水水復凍焉得滔滔向東注東風吹雲不作雪瀟瀟雨聲中夜發孤舟泊在荒江濱破蘆為篷漏不歇衾裯霑濕寒如氷骨縮筋攣哽嗚咽天將憂戚玉汝成杜叟之歌漫愁絶隂陽運轉無停機平分四氣天何私春宵苦短冬苦永韶華樂事恆參差非關時序故乖異人生離合不可期髙堂晏寢有餘暇奔波道路應爾為自武林至丁郭舟中雜興八首舟行淹宿雨稍霽泛通川深霧羣山沒長天曠野連桃開榆葉小麥秀菜花鮮漸喜升平象髙飛見紙鳶其二澤國何迢遞春深興轉幽田疇低水岸村舍傍河流纜拂花枝裊帆將樹影稠何年來此地長日駕扁舟其三晚來風勢歇又見日臨曛逺岫留赮彩踈星耿薄雲波流碧月動舟過鏡天分何處危樓上歌聲靜夜聞其四寂寞空江上漁舟起暮烟明湖天際濶落日霧中圎宿鷺毛衣潔歸鴉羽翼聨故山千里隔悵望一悽然其五天風收宿霧霽景曉澄明青喜晴空出紅看旭日生遊魚翻浪短乳燕掠泥輕衮衮春還半應慚隱遁名其六今宵天上月應照故鄉春桂影生圓魄蟾光隱半輪盈虧知有定離别最相親萬里清輝遍偏驚旅泊人其七重到昔遊地茫然惑去途髙原深蔓草沃野浸平湖水濶蛟虬橫山空鳥雀呼淒涼今古意落日片帆孤其八京華行漸近喜色上愁顔風定舟初穩天清水自閒披衣當暖日散髮對青山去去知何日遊人重此還舟中遇雨分韻得舟字逆浪隨風白隂雲覆客舟雨聲生滴瀝波靣㸃浮漚昏黑山藏樹蒼茫蜃結樓髙吟見真趣何必問離憂錢唐遣懷江風吹浪雨冥冥雲暗春山霧壓城箭鏃不隨錢氏沒黍苗還向宋陵生海門潮擊千年恨漁浦帆開萬古情昔日繁華總徂謝蒼茫流水亂蛙鳴回至徽州寄吳則敬滿地風塵又暮秋昔遊唯見水東流蕭蕭木葉迷行跡濯濯江花帶别愁元亮歸山非愛酒仲宣懷土莫登樓别來空有思親夢飛過三山白鷺洲次韻瓶中紅梅氷肌天賦玉團團誰染丹英比木難不共小桃爭艷冶自陪修竹報平安瑶池隊裏春風細紫塞聲中夜月寒折向膽瓶看未足一枝還插竹皮冠再題虎丘虎丘山倚闔廬城壯觀東南久擅名聳壑烟霞連海氣凌風樓閣下經聲劍池石冷秋涵月塔劫年深地集靈尚想延陵吳季子寥寥千載不勝情草軒春來草自青鵙鳴芳復歇長嘯山中人披襟弄明月其二池塘清夢覺詩思一何濃欲識東君意閒庭烟雨中漫成二首暖日融風管發生栁條爆眼麥青青化工辛苦先施設臘底春前見此情落梅過雨委滿地辛夷數株花已齊不須爛漫競春色桃樹李樹根成蹊寓錢唐送友還鄉二首一雨生涼渾似秋羈人已起望鄉愁君歸我住情何限后夜相思月滿樓扁舟此日信歸風海上潮生夕照紅送别何須重回首括山遙在碧雲中扇靣小景逺岫凝風翠欲流緑隂深樹晚悠悠抱琴坐石忘歸路流水髙山興最幽登白塔寺有感二首廢圃頽垣曲徑微亭臺舊跡尚依依唯餘野雉憐岑寂荒草叢中作隊飛昔人臺館此山隅鳳舞龍飛列帝居二百年來幾惆悵人間何地覓華胥松溪放舟圖蒼松數株葉如幄影落滄波紫翠間想得遊人清賞後扁舟載月夜深還送僧遊方二首天下車書已混同任渠南北與西東休教暮雨孤村夜却使家山入夢中匡廬華頂一躋攀心地開明眼界寬記取當時好山色還家寫作畫圖看舟中漫興六首兩岸青山插劍鋩一灣碧水引流長蕩槳却過深蔚處棲禽飛起一雙雙溪上茆廬山上田蒼松翠竹復森然老農自得生涯樂閒共行人說往年漠漠平林漫漫沙數聲雞犬有人家停舟最愛山頭月照見寒梅一樹花好溪溪水鏡般清流盡人間無限情幾日望家今已近潺湲不是隴頭聲白露濛濛不見山輕舟一葉下危灘亂石堆中尋故道不獨﨑嶇行路難少微山上王髙士結屋號作神仙居山空夜寂何所事皓月一天歌步虛登白雲山白雲山上樹層層萬里秋空入眼明我著芒鞋看畫壁山僧相見不知名寧國道中緑樹隂隂生夏涼翠筠解籜淨如霜羈魂漫遂愁雲去逺水他山更斷腸過丹陽湖二首數朵青山迷逺黛一行白鷺下汀洲孤帆影落長天外蘆葉蕭蕭滿地愁碧樹彤霞錦繡中扁舟搖揚芰荷風多情惟有如弓月照見離人兩鬢蓬登西巖寺柬益上人雲抱青山深復深日融清露滴幽林鳥啼樹發春如許試問髙人身內心白團扇團團明月比容輝淅淅秋風想翠微莫遣塵埃悲篋笥可人還憶暑涼時雙溪八景八首溪流逺抱滄波合山勢中分碧樹深雨後晴初最堪賞風光役盡百年心右雙溪清漲山枕清溪寺隱山暮雲深鎖羃林烟近來渾忘登臨興閒聼鐘聲落枕邊右古寺鳴鐘春日逍遙湖上行東風駘蕩若為情却憐栁絮隨風舞又見荷錢貼水生右湖邊杖屨網得鱸魚上釣舟篘來濁酒滿瓷甌晚涼倚杖觀流水更有新詩樂倡酬右溪畔行吟膏雨溟濛滌凍塗杏花深處鳥相呼東郊蓑笠勤農事好遣良工繢作圖右春郊耕雨苧蘿山下女兒嬌回首吳宫恨未消獨立西風緣底事效顰空自逞妖嬈右秋浦浣紗堤樹無風䕃緑波游魚隊隊鏡中過惟應赤鯉乘桃浪夜半飛騰奈爾何右魚遊潭樹蒼嶺雲深欲度遲蕩山秋暮亦堪悲近時禾黍蕭疏盡莫向溝塍圖飽饑右雁聚平沙自怡集
