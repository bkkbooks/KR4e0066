body:
  text: 自怡集别集類五明提要臣等謹按自怡集一巻明劉璉撰璉字孟藻青田人誠意伯基長子洪武十年為考功監丞兼試監察御史出為江西布政司右㕘政卒年三十二是集為其子廌所編末附洪武十三年國史院編修官呉從善所作哀辭備述基從太祖起兵璉在南山日制馭諸草竊請設談洋巡檢以靖逃盜之源及沮沈立本媚附權臣事惟以材畧氣節稱之不及其文章巻首載秦府紀善黄伯生序稱嘗見其遇事剛果坐折姦佞不撓不阿宜其少年鋭氣盛滿于中今讀其詩顧乃溫柔沖淡怛然有愛君憂國之至情而自視欿然如有不足以為庶幾於聞道今觀此集惟七言律詩頗渉流利圓美不出元末之格然僅四首蓋非所喜作至於五言古體居集中之大半皆詞㫖髙雅而運思深摯殆于駕兩宋而上之以繼犁眉公諸集可謂不愧其父而明人罕稱道之者殆轉以勲閥掩歟乾隆四十三年三月恭校上總纂官臣紀昀臣陸錫熊臣孫士毅總校官臣陸費墀自怡集序自怡集者中奉大夫江西等處承宣布政使司㕘政劉君孟藻所著詩也詩凡九十四首蓋孟藻少臨事而又年三十二以卒其所著述亦多散亡故其所見止此嗚呼為士者修之于身施之于事業固不假是以傳然使後之人頌其詩讀其書而尚論其世將不有賴于此乎夫在心為志發言為詩詩者言之華者也古人謂有有道之言有有徳之言予亦謂有有才者之言有道者心無所累故其言和平而不迫有徳者心有所守故其言典雅而不肆若夫言之美者麗如毛嬙壯如荆卿竒如孫吳之兵富如陶朱猗頓隨取而有長篇短韻各自名家然語其才則有餘求其本諸道徳則槩乎未有也是以或失之淫或失之險怪或失之靡志得則矜以驕一不得志則怨以誹而詩病矣孟藻先中丞以宏才大畧佐上定天下策勛受封而且以文章擅一代之盛孟藻侍㳺輦下所與交者皆鴻師碩儒既而入賛考功試御史出佐大藩余嘗見其奏對詳明遇事剛果坐折奸佞不撓不阿宜其少年鋭氣盛滿于中今讀其詩顧乃温柔冲淡怛然有愛君憂國之至情而自視欿然如有不足噫若孟藻非所謂有徳而庶幾乎聞道者耶予在鄉里辱逰孟藻兄弟間及竊禄京師與孟藻待詔闕下未嘗一日不相親也孟藻尋有江西之命而余亦侍王之國關中别去二年而孟藻不可作矣其子廌以是編將刻諸梓屬予序之予義不得辭若夫孟藻平生大節作者述之已備兹不著洪武十三年二月望日將仕郎秦府紀善同郡黄伯生序
