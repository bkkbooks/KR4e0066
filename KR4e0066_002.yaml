body:
  text: 故㕘政劉君孟藻哀辭有序孟藻姓劉氏諱璉世為處州青田人皇贈永嘉郡公諱爚之孫故御史中丞䕶軍誠意伯之冡子也由考功監丞歴試監察御史為江西等處承宣布政使司右㕘政積階至中奉大夫年三十有二以疾薨于位孟藻為人敏慧警頴讀書二三過輒成誦終其身不忘髫齡中即嶷然狀成人習詩文操觚立就屬元之季所在盜起中丞仰觀俯察奮從真帝于大江之東為之發蹤指示謀不出幄而制勝千里筭無遺䇿用能剗平羣雄混一四海定功受封為開國之佐當是時也孟藻獨將家屬處南田山中南田左右故草竊根據嘯聚不以時忌中丞任事將禽獮之乃偽為服屬而圖肆毒螫于隂孟藻潛覺焉撫其豪酋結以忠義或委以利或惕以威或却制其要害咸就規束莫敢蠢中丞之舊故姻戚與凢侍下之衆孟藻罔不人得其歡心侍中丞若嚴父夏日屏氣息慄戰于股退見孟藻煦如陽春由是山谷無間逺邇賢不肖惟孟藻是附孟藻亦各有以處之不紊毫與髪及中丞之請老而歸也天子念其勲伐欲數得問勞孟藻以一介行李往來于京者不憚六七至則燕見于上類家人父子俯伏陳對詳簡中宜上嘗字中丞言曰伯温有子足以翊賛春宮矣于是廷臣自宰輔而下鮮不器孟藻者初甌括之間有地曰談洋負隂而逺又界于閩無賴倚為窟以私販負軍戍徒役逋逃不啻淵藪中丞病之入朝以為言請置廵檢于其地上從之執政權臣以出不由己為愧㑹中丞歸遣孟藻達封事言郡縣不法者上輒私行焉而孟藻又不先以關白執政執政滋怒因乗以隙欲搆入其罪賴天子明聖孟藻得無隨坐時洪武六年也七年中丞復朝京師孟藻實從上數欲官孟藻中丞辭遣之中丞既薨九年冬十月皇帝上緬元象慨欽天之失職命御史賫詔謂孟藻令上其父所著觀象玩占等書及天文諸家言孟藻已縢藏石室悉取送官仍走謁于帝奏曰臣先臣基當屬纊時畀臣抱書入獻無失其業臣遵治命謹已緘閉無泄俟服闋上今已送官敢昧死以聞上嗟嘆良久乃曰卿忠孝具著宜留事朕孟藻叩頭嗚咽以未禫為請詔許歸終制賜鈔三十貫皇太子召賜食更贈五十貫勉諭彌厚十年夏六月既釋服遂拜考功之命考覈當其可稱厥職以謹勑見褒于上故不越年而超佐藩閫將有大任焉十二年出刑部尚書沈立本為布政使立本素諂附權臣至官即求所以媚之之事孟藻牢持不可立本屢動以危言欲脅制孟藻孟藻怒曰吾廷受帝命㕘政江右知報國而已他所不䘏何有于使哉發憤得疾六月某日終于公署訃聞天子為之震悼輟視朝遣使弔問親御宸翰為文祀以中牢嗚呼孟藻與余為通家有兄弟之好余齒差長毎班孟藻上暨余忝京官孟藻之來實主于余可否必籌飲食必耦寢必同席余汨于公事若沐漆孟藻多憐余之色余後歸田里得與孟藻㑹者僅四五而孟藻逝矣孟藻性和易見幾明决雖待人無忤而内懷剛正動率循律于非義際毅然有不可奪之節余意其當桂石斯世康濟兆民異日弼守文之君為股肱心膂以享有太平孰謂遽止于斯乎人之生患于無才有才患不見用既用患不能顯而得君以行其志今孟藻才已用于時尊且顯矣忠知于君而澤加于人矣家為賢子國有良臣保有名爵正而斃焉生榮死哀尚何道哉雖然余于孟藻其能忘情否也孟藻之子廌以喪歸余適在温郡不能撫其櫬哭諸野比塟又弗克執紼以窆悲可勝既耶追憶曩時作辭以哀孟藻且書遺其弟仲景俾廌刻諸冢上其辭曰南田莓莓兮武陽崔崔孰儲其精兮生賢孔才猗彼永嘉兮乃先厥開奮興翊運兮龍乘于雷良平其勲兮文驅鄒枚克裕而後兮有植必培嗟嗟孟藻兮棟梁之材辭華蔚充兮如瓊如瑰又多藝徳兮既美且偲無纎無洪兮衆善畢該結知主君兮厥轂乃推朝登金門兮莫躋金臺啓沃既良兮䕫龍我陪帝瞻豫章兮西江之隈曰兹庶務兮汝佐其裁繩愆疏滯兮澤彼一垓方期顯庸兮陟子司台若和鼎羮兮以鹽以梅曷尸大塊兮亟畀之災民之無依兮西山云頽其志則誼兮壽齊于回有子輿櫬兮載號而哀鬛如其封兮松栢是栽攄情託辭兮以泄予哀琢之貞珉兮示于方來嗟嗟孟藻兮嗚呼洪武十有三年嵗在上章涒灘冬十月戊午朔前翰林國史院編修官同郡吳從善製文自怡集附録
